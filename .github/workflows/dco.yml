name: DCO sign-off

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -e
          missing=0
          while read -r sha; do
            msg=$(git log -1 --format=%B "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")
            author_name=$(git log -1 --format='%an' "$sha")
            if ! echo "$msg" | grep -qE "^Signed-off-by: .+ <.+@.+>$"; then
              echo "::error::Commit $sha is missing a 'Signed-off-by:' trailer."
              echo "  Author: $author_name <$author_email>"
              echo "  Run 'git commit --amend -s' (or 'git rebase --signoff') to fix."
              missing=$((missing+1))
            fi
          # --no-merges: Merge-Commits sind exempt (Standard-DCO-Bot-Semantik).
          # Ohne das failt jeder von GitHubs update-branch erzeugte Merge-Commit
          # den Check und wedged behind-PRs dauerhaft (Incident 2026-07-03).
          done < <(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA")

          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "DCO check failed: $missing commit(s) missing Signed-off-by."
            echo "See CONTRIBUTING.md for the Developer Certificate of Origin."
            exit 1
          fi
          echo "All commits carry a Signed-off-by trailer."
